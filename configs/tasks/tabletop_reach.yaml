name: tabletop_reach
robot: arm_v0
reward: reach_v0
max_episode_steps: 100
success_threshold: 0.05
simulation:
  timestep: 0.02
  frame_skip: 5
target:
  default_position: [0.45, 0.0, 0.04]
randomization:
  target_position:
    x: [0.25, 0.55]
    y: [-0.25, 0.25]
    z: [0.04, 0.04]
  initial_qpos:
    shoulder: [-0.2, 0.2]
    elbow: [-0.2, 0.2]
  observation_noise_std: 0.0
  actuator_scale: [0.9, 1.1]
